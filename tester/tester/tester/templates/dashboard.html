<!DOCTYPE html>
<html>
<head>
    <title>API Monitoring Dashboard</title>
</head>
<body>
    <h1>Historique des runs</h1>
    <table border="1">
        <tr>
            <th>Date</th>
            <th>Passés</th>
            <th>Échoués</th>
            <th>Latence moyenne</th>
            <th>P95</th>
        </tr>
        {% for run in runs %}
        <tr>
            <td>{{ run[1] }}</td>
            <td>{{ run[2] }}</td>
            <td>{{ run[3] }}</td>
            <td>{{ run[4] }}</td>
            <td>{{ run[5] }}</td>
        </tr>
        {% endfor %}
    </table>
</body>
</html>
